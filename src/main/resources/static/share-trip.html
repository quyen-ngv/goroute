<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="agd-partner-manual-verification" />
    <title>Shared Trip - GoRoute</title>
    <link rel="stylesheet" href="/goroute/goroute-theme.css">
</head>

<body class="share-page">
    <div class="container">
        <div id="loading" class="loading">
            <h2>Loading trip...</h2>
        </div>
        <div id="error" class="error" style="display: none;">
            <h2>Trip not found</h2>
        </div>
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://onestudy.id.vn/goroute';

        function getTripIdFromUrl() {
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1].replace('.html', '');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function formatDateShort(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' });
        }

        function getDateForDay(startDate, dayNumber) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + (dayNumber - 1));
            return date;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            return timeStr.substring(0, 5);
        }

        function formatMoney(amount, currency) {
            if (currency === 'VND') {
                return new Intl.NumberFormat('vi-VN').format(amount) + 'Г„вҖҳ';
            }
            return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(amount);
        }

        function openGoogleMaps(lat, lng, address) {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isMobile) {
                if (lat && lng) {
                    window.location.href = `google.navigation:q=${lat},${lng}`;
                } else if (address) {
                    window.location.href = `google.navigation:q=${encodeURIComponent(address)}`;
                }
            } else {
                if (lat && lng) {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank');
                } else if (address) {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`, '_blank');
                }
            }
        }

        function getCategoryClass(category) {
            const cat = (category || '').toUpperCase();
            const classes = {
                'DEPARTURE': 'type-departure', 'FOOD': 'type-food',
                'ACCOMMODATION': 'type-hotel', 'HOTEL': 'type-hotel',
                'TRANSPORTATION': 'type-transport', 'TRANSPORT': 'type-transport',
                'ACTIVITY': 'type-activity', 'SIGHTSEEING': 'type-attraction',
                'ATTRACTION': 'type-attraction', 'SHOPPING': 'type-activity', 'OTHER': 'type-transport'
            };
            return classes[cat] || 'type-transport';
        }

        function getDotClass(category) {
            const cat = (category || '').toUpperCase();
            const classes = {
                'DEPARTURE': 'dot-violet', 'FOOD': 'dot-green',
                'ACCOMMODATION': 'dot-blue', 'HOTEL': 'dot-blue',
                'TRANSPORTATION': 'dot-gray', 'TRANSPORT': 'dot-gray',
                'ACTIVITY': 'dot-pink', 'SIGHTSEEING': 'dot-orange',
                'ATTRACTION': 'dot-orange', 'SHOPPING': 'dot-violet', 'OTHER': 'dot-gray'
            };
            return classes[cat] || 'dot-gray';
        }

        function getCategoryIcon(category) {
            const cat = (category || '').toUpperCase();
            const icons = {
                'DEPARTURE': 'ГўЕ“ЛҶГҜВёВҸ', 'FOOD': 'Г°ЕёВҚВҪГҜВёВҸ', 'ACCOMMODATION': 'Г°ЕёВҸВЁ', 'HOTEL': 'Г°ЕёВҸВЁ',
                'TRANSPORTATION': 'Г°ЕёЕЎвҖ”', 'TRANSPORT': 'Г°ЕёЕЎвҖ”', 'ACTIVITY': 'ГўЕЎвҖң',
                'SIGHTSEEING': 'Г°ЕёвҖңВ·', 'ATTRACTION': 'Г°ЕёвҖңВ·', 'SHOPPING': 'Г°ЕёвҖәВҚГҜВёВҸ', 'OTHER': 'Г°ЕёвҖңЕ’'
            };
            return icons[cat] || 'Г°ЕёвҖңЕ’';
        }

        function getCategoryLabel(category) {
            const cat = (category || '').toUpperCase();
            const labels = {
                'DEPARTURE': 'Bay', 'FOOD': 'Г„вҖҡn uГЎВ»вҖҳng', 'ACCOMMODATION': 'LГҶВ°u trГғВә', 'HOTEL': 'LГҶВ°u trГғВә',
                'TRANSPORTATION': 'Di chuyГЎВ»Ж’n', 'TRANSPORT': 'Di chuyГЎВ»Ж’n', 'ACTIVITY': 'HoГЎВәВЎt Г„вҖҳГЎВ»в„ўng',
                'SIGHTSEEING': 'Г„ВҗГЎВ»вҖ№a Г„вҖҳiГЎВ»Ж’m', 'ATTRACTION': 'Г„ВҗГЎВ»вҖ№a Г„вҖҳiГЎВ»Ж’m', 'SHOPPING': 'Mua sГЎВәВҜm', 'OTHER': 'KhГғВЎc'
            };
            return labels[cat] || 'KhГғВЎc';
        }

        function totalExpenses(expenses) {
            return expenses.reduce((sum, e) => sum + e.amount, 0);
        }

        function renderTrip(trip) {
            const content = document.getElementById('content');

            // Calculate totals
            const allActivityExpenses = trip.activities.flatMap(a => a.expenses || []);
            const grandTotal = totalExpenses([...allActivityExpenses, ...(trip.expenses || [])]);

            let html = `
                <div class="header">
                    <h1>${trip.name}</h1>
                    <div class="info">
                        ${trip.destination ? `<div>Г°ЕёвҖңВҚ ${trip.destination}</div>` : ''}
                        <div>Г°ЕёвҖңвҖҰ ${formatDate(trip.startDate)} ГўвӮ¬вҖң ${formatDate(trip.endDate)}</div>
                    </div>
                    <div class="stats">
                        <span class="stat-pill">${Math.ceil((new Date(trip.endDate) - new Date(trip.startDate)) / (1000 * 60 * 60 * 24)) + 1} ngГғВ y</span>
                        <span class="stat-pill">${trip.activities.length} hoГЎВәВЎt Г„вҖҳГЎВ»в„ўng</span>
                        <span class="stat-pill">TГЎВ»вҖўng ${formatMoney(grandTotal, trip.currency)}</span>
                    </div>
                </div>
                <div class="content">
                    <div class="section-title">
                        <span style="font-size: 16px;">Г°ЕёвҖ”ВәГҜВёВҸ</span>
                        <span class="section-title-text">LГЎВ»вҖ№ch trГғВ¬nh</span>
                    </div>
            `;

            // Group activities by day
            const activitiesByDay = {};
            trip.activities.forEach(activity => {
                if (!activitiesByDay[activity.dayNumber]) {
                    activitiesByDay[activity.dayNumber] = [];
                }
                activitiesByDay[activity.dayNumber].push(activity);
            });

            // Desktop table
            html += `
                <div class="desktop-table">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 56px;">NgГғВ y</th>
                                <th style="width: 60px;">GiГЎВ»Вқ</th>
                                <th>HoГЎВәВЎt Г„вҖҳГЎВ»в„ўng</th>
                                <th style="width: 155px;">Г„ВҗГЎВ»вҖ№a Г„вҖҳiГЎВ»Ж’m</th>
                                <th style="width: 100px;">LoГЎВәВЎi</th>
                                <th style="width: 80px;">Chi phГғВӯ</th>
                                <th style="width: 24px;"></th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            Object.keys(activitiesByDay).sort((a, b) => a - b).forEach(day => {
                const dayActivities = activitiesByDay[day].sort((a, b) => {
                    if (!a.startTime) return 1;
                    if (!b.startTime) return -1;
                    return a.startTime.localeCompare(b.startTime);
                });

                dayActivities.forEach((activity, idx) => {
                    const icon = getCategoryIcon(activity.category);
                    const label = getCategoryLabel(activity.category);
                    const hasLocation = (activity.lat && activity.lng) || activity.address;
                    const badgeClass = idx === 0 ? 'day-badge' : 'day-badge day-badge-inactive';
                    const activityTotal = activity.expenses ? totalExpenses(activity.expenses) : 0;
                    const hasDetail = (activity.expenses && activity.expenses.length > 0) || (activity.notes && activity.notes.length > 0);

                    html += `
                        <tr class="activity-row" data-activity-id="${activity.id}" onclick="toggleDetail('${activity.id}')">
                            <td><div class="${badgeClass}">${day}</div></td>
                            <td class="time-cell">Г°ЕёвҖўВҗ ${formatTime(activity.startTime) || '-'}</td>
                            <td class="name-cell">${activity.name}</td>
                            <td class="location-cell" onclick="event.stopPropagation(); openGoogleMaps(${activity.lat}, ${activity.lng}, '${(activity.address || '').replace(/'/g, "\\'")}')">${hasLocation ? 'Г°ЕёвҖңВҚ ' + activity.address : '-'}</td>
                            <td><span class="type-badge ${getCategoryClass(activity.category)}">${icon} ${label}</span></td>
                            <td style="text-align: right; font-weight: ${activityTotal > 0 ? 600 : 400}; color: ${activityTotal > 0 ? '#1f2937' : '#e5e7eb'};">${activityTotal > 0 ? formatMoney(activityTotal, trip.currency) : 'ГўвӮ¬вҖқ'}</td>
                            <td>${hasDetail ? '<span style="font-size: 13px; color: #9ca3af;">ГўвҖ“Вј</span>' : ''}</td>
                        </tr>
                    `;

                    if (hasDetail) {
                        html += `<tr id="detail-${activity.id}" style="display: none;"><td colspan="7" class="detail-panel">`;

                        if (activity.expenses && activity.expenses.length > 0) {
                            html += `<div class="detail-section"><div class="detail-header">Г°ЕёвҖҷВі Chi phГғВӯ</div>`;
                            activity.expenses.forEach(e => {
                                html += `<div class="expense-item"><span>Г°ЕёвҖҷВ°</span><span>${e.description}</span><span class="expense-amount">${formatMoney(e.amount, e.currency)}</span></div>`;
                            });
                            html += `</div>`;
                        }

                        if (activity.notes && activity.notes.length > 0) {
                            html += `<div class="detail-section"><div class="detail-header">Г°ЕёвҖңВқ Ghi chГғВә</div>`;
                            activity.notes.forEach(n => {
                                html += `<div class="note-item"><span>Г°ЕёвҖңЕ’</span><span>${n.content}</span></div>`;
                            });
                            html += `</div>`;
                        }

                        html += `</td></tr>`;
                    }
                });
            });

            html += `</tbody></table></div>`;

            // Mobile timeline
            html += `<div class="mobile-timeline">`;

            Object.keys(activitiesByDay).sort((a, b) => a - b).forEach(day => {
                const dayActivities = activitiesByDay[day].sort((a, b) => {
                    if (!a.startTime) return 1;
                    if (!b.startTime) return -1;
                    return a.startTime.localeCompare(b.startTime);
                });

                const dayDate = getDateForDay(trip.startDate, parseInt(day));
                const dayDateLabel = formatDateShort(dayDate.toISOString());

                html += `
                    <div class="day-group">
                        <div class="day-header">
                            <div class="day-badge-mobile">${day}</div>
                            <span class="day-date">${dayDateLabel}</span>
                            <div class="day-divider"></div>
                        </div>
                        <div class="activity-card">
                `;

                dayActivities.forEach(activity => {
                    const icon = getCategoryIcon(activity.category);
                    const dotClass = getDotClass(activity.category);
                    const hasLocation = (activity.lat && activity.lng) || activity.address;
                    const activityTotal = activity.expenses ? totalExpenses(activity.expenses) : 0;
                    const hasDetail = (activity.expenses && activity.expenses.length > 0) || (activity.notes && activity.notes.length > 0);

                    html += `
                        <div class="activity-item" data-activity-id="${activity.id}" onclick="toggleDetailMobile('${activity.id}')">
                            <div class="type-dot ${dotClass}"></div>
                            <div class="activity-info">
                                <div class="activity-top">
                                    <div class="activity-name">${activity.name}</div>
                                    <span class="type-badge ${getCategoryClass(activity.category)}">${icon}</span>
                                </div>
                                <div class="activity-meta">
                                    ${activity.startTime ? `<div class="activity-meta-item">Г°ЕёвҖўВҗ ${formatTime(activity.startTime)}</div>` : ''}
                                    ${activity.address ? `<div class="activity-meta-item ${hasLocation ? 'clickable' : ''}" onclick="event.stopPropagation(); openGoogleMaps(${activity.lat}, ${activity.lng}, '${(activity.address || '').replace(/'/g, "\\'")}')">${hasLocation ? 'Г°ЕёвҖңВҚ' : ''} ${activity.address}</div>` : ''}
                                    ${activityTotal > 0 ? `<div class="activity-meta-item activity-meta-expense">Г°ЕёвҖҷВі ${formatMoney(activityTotal, trip.currency)}</div>` : ''}
                                    ${activity.notes && activity.notes.length > 0 ? `<div class="activity-meta-item activity-meta-notes">Г°ЕёвҖңВқ ${activity.notes.length}</div>` : ''}
                                </div>
                            </div>
                            ${hasDetail ? '<span class="chevron-icon">ГўвҖ“Вј</span>' : ''}
                        </div>
                    `;

                    if (hasDetail) {
                        html += `<div id="detail-mobile-${activity.id}" style="display: none;" class="detail-panel">`;

                        if (activity.expenses && activity.expenses.length > 0) {
                            html += `<div class="detail-section"><div class="detail-header">Г°ЕёвҖҷВі Chi phГғВӯ</div>`;
                            activity.expenses.forEach(e => {
                                html += `<div class="expense-item"><span>Г°ЕёвҖҷВ°</span><span>${e.description}</span><span class="expense-amount">${formatMoney(e.amount, e.currency)}</span></div>`;
                            });
                            html += `</div>`;
                        }

                        if (activity.notes && activity.notes.length > 0) {
                            html += `<div class="detail-section"><div class="detail-header">Г°ЕёвҖңВқ Ghi chГғВә</div>`;
                            activity.notes.forEach(n => {
                                html += `<div class="note-item"><span>Г°ЕёвҖңЕ’</span><span>${n.content}</span></div>`;
                            });
                            html += `</div>`;
                        }

                        html += `</div>`;
                    }
                });

                html += `</div></div>`;
            });

            html += `</div>`;

            // Trip-level expenses and notes
            if ((trip.expenses && trip.expenses.length > 0) || (trip.notes && trip.notes.length > 0)) {
                html += `
                    <div class="trip-section">
                        <div class="section-title">
                            <span style="font-size: 16px;">Г°ЕёвҖңвҖ№</span>
                            <span class="section-title-text">ThГғВҙng tin chuyГЎВәВҝn Г„вҖҳi</span>
                            <div style="flex: 1; height: 1px; background: #e5e7eb;"></div>
                        </div>
                `;

                if (trip.expenses && trip.expenses.length > 0) {
                    const tripExpenseTotal = totalExpenses(trip.expenses);
                    html += `
                        <div class="trip-card">
                            <div class="trip-card-header" onclick="toggleTripDetail('trip-expenses')">
                                <div class="trip-icon trip-icon-expense">Г°ЕёвҖҷВі</div>
                                <div style="flex: 1;">
                                    <div class="trip-card-title">Chi phГғВӯ chuyГЎВәВҝn Г„вҖҳi</div>
                                    <div class="trip-card-subtitle">${trip.expenses.length} khoГЎВәВЈn ГӮВ· tГЎВ»вҖўng ${formatMoney(tripExpenseTotal, trip.currency)}</div>
                                </div>
                                <span style="font-size: 13px; color: #9ca3af;">ГўвҖ“Вј</span>
                            </div>
                            <div id="trip-expenses" style="display: none;" class="detail-panel">
                                <div class="detail-section">
                    `;
                    trip.expenses.forEach(e => {
                        html += `<div class="expense-item"><span>Г°ЕёвҖҷВ°</span><span>${e.description}</span><span class="expense-amount">${formatMoney(e.amount, e.currency)}</span></div>`;
                    });
                    html += `</div></div></div>`;
                }

                if (trip.notes && trip.notes.length > 0) {
                    html += `
                        <div class="trip-card">
                            <div class="trip-card-header" onclick="toggleTripDetail('trip-notes')">
                                <div class="trip-icon trip-icon-note">Г°ЕёвҖңВқ</div>
                                <div style="flex: 1;">
                                    <div class="trip-card-title">Ghi chГғВә chuyГЎВәВҝn Г„вҖҳi</div>
                                    <div class="trip-card-subtitle">${trip.notes.length} ghi chГғВә</div>
                                </div>
                                <span style="font-size: 13px; color: #9ca3af;">ГўвҖ“Вј</span>
                            </div>
                            <div id="trip-notes" style="display: none;" class="detail-panel">
                                <div class="detail-section">
                    `;
                    trip.notes.forEach(n => {
                        html += `<div class="note-item"><span>Г°ЕёвҖңЕ’</span><span>${n.content}</span></div>`;
                    });
                    html += `</div></div></div>`;
                }

                html += `</div>`;
            }

            html += `</div>`; // Close content

            content.innerHTML = html;
            content.style.display = 'block';
        }

        function toggleDetail(activityId) {
            const detailRow = document.getElementById(`detail-${activityId}`);
            const activityRow = document.querySelector(`[data-activity-id="${activityId}"]`);
            if (detailRow.style.display === 'none') {
                detailRow.style.display = 'table-row';
                activityRow.classList.add('expanded');
            } else {
                detailRow.style.display = 'none';
                activityRow.classList.remove('expanded');
            }
        }

        function toggleDetailMobile(activityId) {
            const detailPanel = document.getElementById(`detail-mobile-${activityId}`);
            const activityItem = document.querySelector(`.mobile-timeline [data-activity-id="${activityId}"]`);
            if (detailPanel.style.display === 'none') {
                detailPanel.style.display = 'block';
                activityItem.classList.add('expanded');
            } else {
                detailPanel.style.display = 'none';
                activityItem.classList.remove('expanded');
            }
        }

        function toggleTripDetail(id) {
            const panel = document.getElementById(id);
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        }

        async function loadTrip() {
            const tripId = getTripIdFromUrl();
            try {
                const response = await fetch(`${API_BASE_URL}/v1/api/public/trips/${tripId}`);
                if (!response.ok) throw new Error('Trip not found');
                const data = await response.json();
                if (data.meta && data.meta.code === 200000 && data.data) {
                    document.getElementById('loading').style.display = 'none';
                    renderTrip(data.data);
                } else {
                    throw new Error('Invalid response');
                }
            } catch (error) {
                console.error('Error loading trip:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        loadTrip();
    </script>
</body>

</html>
